name: LinkedIn Auto Post

on:
  schedule:
    # النشر أيام الأحد، الثلاثاء، الخميس، السبت الساعة 9:00 صباحاً بتوقيت جرينتش
    - cron: '0 9 * * 0,2,4,6'
  workflow_dispatch: # للتشغيل اليدوي

jobs:
  post:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # للسماح للبوت بتحديث ملف used_topics.json

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests groq

      - name: Run Script
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python script.py

      - name: Sync and Push Changes
        run: |
          git config user.name "LinkedIn Bot"
          git config user.email "bot@automation.com"
          
          # 1. أضف التغييرات التي قام بها السكريبت أولاً (Stage the changes)
          # هذا يجعل Git "يعرف" عن التغييرات قبل محاولة الـ pull
          git add used_topics.json
          
          # 2. جلب التحديثات من المستودع مع دمجها خلف تغييراتك الحالية
          # استخدام --autostash سيقوم بإخفاء التغييرات مؤقتاً وإعادتها بعد الـ pull تلقائياً
          git pull --rebase --autostash origin main
          
          # 3. التأكد من وجود تغييرات حقيقية لعمل Commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update topics history [skip ci]"
            git push origin main
          fi
