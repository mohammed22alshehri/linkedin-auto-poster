name: LinkedIn Auto Post

on:
  schedule:
    - cron: '0 5 * * 0,2,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-genai

      - name: Run script
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python script.py

      - name: Save topics history
        run: |
          git config user.name "LinkedIn Bot"
          git config user.email "bot@automation.com"
          git add used_topics.json
          git diff --staged --quiet || git commit -m "Update topics history - $(date '+%Y-%m-%d')"
          git push
