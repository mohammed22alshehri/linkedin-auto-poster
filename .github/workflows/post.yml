name: LinkedIn Auto Post

on:
  schedule:
    # سيتم التشغيل يومياً الساعة 9 صباحاً بتوقيت جرينتش
    - cron: '0 9 * * *'
  workflow_dispatch: # يتيح لك تشغيل البوت يدوياً للتجربة

jobs:
  post:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # ضروري للسماح للبوت بتحديث ملف used_topics.json

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests groq

      - name: Run Script
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python script.py

      - name: Sync and Push Changes
        run: |
         git config user.name "LinkedIn Bot"
          git config user.email "bot@automation.com"
          
          # تجاهل مجلدات الكاش الخاصة ببيثون
          echo "__pycache__/" >> .gitignore
          
          git pull --rebase origin main
          
          # محاولة إضافة الملف فقط إذا كان موجوداً وتم تعديله
          if [ -f used_topics.json ]; then
            git add used_topics.json
          fi
          
          # التحقق من التغييرات في used_topics.json فقط
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update topics history - $(date '+%Y-%m-%d')"
            git push origin main
          fi
