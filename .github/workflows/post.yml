name: LinkedIn Auto Post

on:
  schedule:
    # التشغيل يومياً الساعة 9 صباحاً بتوقيت جرينتش
    - cron: '0 9 * * *'
  workflow_dispatch: # للتشغيل اليدوي وقتما تحب

jobs:
  post:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # للسماح للبوت بتحديث ملف used_topics.json

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests google-generativeai  # أضفنا مكتبة Gemini هنا

      - name: Run Script
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # أضفنا مفتاح Gemini
        run: python script.py

      - name: Sync and Push Changes
        run: |
          git config user.name "LinkedIn Bot"
          git config user.email "bot@automation.com"
          
          # تأكد من وجود ملف الذاكرة إذا لم يكن موجوداً
          if [ ! -f used_topics.json ]; then
            echo "[]" > used_topics.json
          fi

          git pull --rebase origin main
          
          git add used_topics.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update topics history [skip ci]"
            git push origin main
          fi
