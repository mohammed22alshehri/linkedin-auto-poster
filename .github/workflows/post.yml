name: LinkedIn Auto Post

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch: 

jobs:
  post:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          # لاحظ هنا استبدلنا مكتبة جيميناي بمكتبة جروك
          pip install requests groq

      - name: Run Script
        env:
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          # استخدمنا هنا المفتاح الخاص بـ Groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python script.py

      - name: Sync and Push Changes
        run: |
          git config user.name "LinkedIn Bot"
          git config user.email "bot@automation.com"
          
          # التأكد من وجود الملف قبل إضافته لتجنب الأخطاء
          touch used_topics.json 
          git add used_topics.json
          
          git pull --rebase origin main
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update topics history - $(date '+%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
